services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clipping-app
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file:
      - path: .env
        required: false
    environment:
      # 컨테이너 내부 네트워크에서 postgres/redis 접근
      DB_URL: jdbc:postgresql://postgres:5432/clipping
      DB_USERNAME: clipping_admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  postgres:
    image: postgres:16.9
    container_name: clipping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clipping_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: clipping
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres-local.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipping_admin -d clipping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: clipping-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  postgres_data:
